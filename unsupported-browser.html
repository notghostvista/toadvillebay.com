<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsupported Browser - Republic of ToadVille Bay (Canada)</title>
    <link rel="icon" type="image/png" href="../Images and Videos/ToadVilleCOA.png" />
    <link rel="apple-touch-icon" href="../Images and Videos/ToadVilleCOA.png" />
    <link rel="stylesheet" href="./styles.css" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to bottom, #001f3f, #004466);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        .anti-piracy-container {
            max-width: 600px;
            padding: 20px;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .anti-piracy-container img {
            width: 120px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 12px;
            color: #ff4d4d;
        }

        p {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        a {
            display: inline-block;
            padding: 10px 18px;
            margin: 5px;
            color: #001f3f;
            background: #fff;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s ease;
        }

        a:hover {
            transform: scale(1.05);
            background: #ff4d4d;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="anti-piracy-container">
        <img src="/Images and Videos/ToadVilleCOA.png" alt="ToadVilleCOA">
        <h1>Unsupported Browser</h1>
        <p>
          Your browser is no longer supported. Please update your browser to the <strong>latest</strong> version or change your browser if using Internet Explorer<br>
        </p>
    </div>
</body>
</html>
